<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Photobomb">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>Photobomb</title>
</head>
<body>

  <!-- Screen: Camera -->
  <div id="screen-camera" class="screen">
    <video id="viewfinder" autoplay playsinline muted></video>
    <canvas id="capture-canvas" hidden></canvas>

    <div id="camera-error" class="overlay-message hidden">
      <div class="overlay-content">
        <svg viewBox="0 0 24 24" class="icon-large"><path d="M12 9a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5 5 5 0 0 1 5-5 5 5 0 0 1 5 5 5 5 0 0 1-5 5m-8.94-1L2 12l1.06-4A10 10 0 0 1 12 2a10 10 0 0 1 8.94 6L22 12l-1.06 4A10 10 0 0 1 12 22a10 10 0 0 1-8.94-6m10.5-11.93A8 8 0 0 0 4.07 11H4l.06.24A8 8 0 0 0 12 20a8 8 0 0 0 7.93-8.76C19.36 7.63 15.9 5 12 5a7.96 7.96 0 0 0-1.44.07z"/></svg>
        <p id="camera-error-message">Camera access is required.</p>
        <button id="btn-retry-camera" class="btn btn-primary">Allow Camera</button>
      </div>
    </div>

    <button id="btn-settings" class="btn-icon camera-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.47.47 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <div class="camera-controls">
      <button id="btn-switch-camera" class="btn-icon" aria-label="Switch camera">
        <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-1.8a1.2 1.2 0 0 0 0-2.4 1.2 1.2 0 0 0 0 2.4zm0-7.7c-1.93 0-3.5 1.57-3.5 3.5s1.57 3.5 3.5 3.5 3.5-1.57 3.5-3.5-1.57-3.5-3.5-3.5z"/></svg>
      </button>
      <button id="btn-capture" class="btn-capture" aria-label="Take photo"></button>
    </div>
  </div>

  <!-- Screen: Review -->
  <div id="screen-review" class="screen hidden">
    <img id="review-image" alt="Captured photo">
    <div class="bottom-bar">
      <button id="btn-retake" class="btn btn-ghost">Retake</button>
      <button id="btn-continue" class="btn btn-primary">Use This →</button>
    </div>
  </div>

  <!-- Screen: Picker -->
  <div id="screen-picker" class="screen hidden">
    <div class="screen-header">
      <button id="btn-picker-back" class="btn-icon" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <h2>Who's crashing the photo?</h2>
    </div>
    <div id="people-grid" class="people-grid"></div>
    <div class="picker-footer">
      <button id="btn-upload-person" class="btn btn-ghost">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        Upload someone
      </button>
    </div>
    <input type="file" id="person-file-input" accept="image/*" hidden>
  </div>

  <!-- Screen: Generating -->
  <div id="screen-generating" class="screen hidden">
    <div class="generating-content">
      <div class="spinner"></div>
      <p class="generating-label">Adding someone to your photo…</p>
      <p class="generating-sub">This may take a moment.</p>
    </div>
    <div class="bottom-bar">
      <button id="btn-cancel-generation" class="btn btn-ghost">Cancel</button>
    </div>
    <div id="generation-error" class="overlay-message hidden">
      <div class="overlay-content">
        <p>Something went wrong. The generation failed or timed out.</p>
        <button id="btn-generation-start-over" class="btn btn-primary">Start Over</button>
      </div>
    </div>
  </div>

  <!-- Screen: Result -->
  <div id="screen-result" class="screen hidden">
    <img id="result-image" alt="Your photobombed photo">
    <div class="bottom-bar">
      <button id="btn-start-over" class="btn btn-ghost">Start Over</button>
      <button id="btn-save" class="btn btn-primary">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
        Save Photo
      </button>
    </div>
  </div>

  <!-- API Key Modal -->
  <div id="modal-apikey" class="modal hidden">
    <div class="modal-box">
      <h2>OpenAI API Key</h2>
      <p>Your key is stored only in your browser's local storage and sent directly to OpenAI — never to any other server.</p>
      <input
        type="password"
        id="input-apikey"
        class="key-input"
        placeholder="sk-..."
        autocomplete="off"
        spellcheck="false"
      >
      <p id="apikey-error" class="key-error hidden"></p>
      <button id="btn-save-apikey" class="btn btn-primary" style="width:100%">Save &amp; Continue</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
